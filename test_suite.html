<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Manga Editor Pro - Automated Test Suite</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #fff; margin: 0; padding: 20px; }
        h1 { color: #8b5cf6; }
        .test-panel { background: #1e293b; padding: 20px; border-radius: 10px; border: 1px solid #334155; margin-bottom: 20px; }
        .row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        button { background: #8b5cf6; color: #fff; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #7c3aed; }
        button:disabled { background: #475569; cursor: not-allowed; }
        .log-box { background: #000; padding: 15px; border-radius: 6px; font-family: monospace; height: 300px; overflow-y: auto; color: #10b981; }
        .log-error { color: #ef4444; }
        .log-warn { color: #f59e0b; }
        .log-info { color: #3b82f6; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .success { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .fail { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
    </style>
</head>
<body>
    <h1><i class="fa-solid fa-vial-virus"></i> Manga Editor Pro Test Suite</h1>
    <p style="color:#aaa;">Sistemin her tuşunu, çeviri API'lerini, kota düşüşlerini ve veri parse işlemlerini otomatik test eden arayüz.</p>
    
    <div class="row">
        <button id="run-all-tests" onclick="runAllTests()">Hemen Testi Başlat</button>
        <button onclick="clearLogs()" style="background:#475569;">Logları Temizle</button>
    </div>

    <div class="test-panel">
        <div id="test-logs" class="log-box">Sistem beklemede... Hazır.</div>
    </div>

    <!-- Bağımlılıkları Yükle (Admin panelini simüle ediyoruz) -->
    <!-- Mock Firebase Core -->
    <script>
        window.useCloud = false; // Testler Yerel (Offline) modda başlasın
        window.FIREBASE_CONFIG = { apiKey: 'AIzaSyBSgwvbtLkeQMwZaQ9wFKk7-tBDBR51ykg' };
    </script>
    <script src="cloud.js"></script>
    <script src="test_suite.js"></script>
</body>
</html>
